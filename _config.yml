title: "bcz-journal"
description: "Public journal by Zaal Panthaki — building The ZAO, WaveWarZ, and ZABAL in public."
author:
  name: "Zaal Panthaki"
  twitter: "bettercallzaal"
twitter:
  username: "bettercallzaal"
  card: "summary_large_image"
social:
  name: "Zaal Panthaki"
  links:
    - "https://x.com/bettercallzaal"
    - "https://www.linkedin.com/in/zaalp"
    - "https://github.com/bettercallzaal"
theme: jekyll-theme-cayman
plugins:
  - jekyll-seo-tag

# Custom domain (journal.bettercallzaal.com via CNAME file at repo root)
url: "https://journal.bettercallzaal.com"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM

# Don't render private folders even if they slip in
exclude:
  - _drafts/
  - "**/_drafts/"
  - "*.draft.md"
  - Gemfile
  - Gemfile.lock
  - vendor/

include:
  - .well-known
