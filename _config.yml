title: "bcz-journal"
description: "Public journal by Zaal Panthaki — building The ZAO, WaveWarZ, and ZABAL in public."
author: "Zaal Panthaki"
theme: jekyll-theme-cayman

# Custom domain (journal.bettercallzaal.com via CNAME file at repo root)
url: "https://journal.bettercallzaal.com"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM

# Don't render private folders even if they slip in
exclude:
  - _drafts/
  - "**/_drafts/"
  - "*.draft.md"
  - Gemfile
  - Gemfile.lock
  - vendor/

include:
  - .well-known
